[package]
name = "chronicle_timeline_widget"
version = "0.1.0"
edition = "2021"
description = "Embeddable timeline viewer widget for React/web applications"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []

[dependencies]
# GUI - egui core
egui = "0.29"
egui_extras = { version = "0.29", features = ["syntect"] }

# Shared timeline core
chronicle_timeline_core = { path = "../timeline-core" }

# eframe for web canvas rendering
eframe = { version = "0.29", default-features = false, features = [
    "glow",
] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"

# WebAssembly bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "HtmlCanvasElement",
    "Performance",
    "CustomEvent",
    "CustomEventInit",
    "EventTarget",
] }
console_error_panic_hook = "0.1"
tracing-wasm = "0.2"
getrandom = { version = "0.3", features = ["wasm_js"] }

[profile.release]
opt-level = "z"
lto = true
