[package]
name = "chronicle_timeline_core"
version = "0.1.0"
edition = "2021"
description = "Shared timeline panel core for native and web applications"
license = "MIT"

[dependencies]
# GUI - egui core only (no eframe)
egui = "0.29"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Serialization (optional for wasm)
serde = { version = "1.0", features = ["derive"], optional = true }

[features]
default = []
serde = ["dep:serde"]
