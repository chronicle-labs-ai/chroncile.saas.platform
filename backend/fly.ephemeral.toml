# Ephemeral environment template for branch-based Fly.io deployments.
# The app name placeholder {{BRANCH_SLUG}} is replaced at provision time
# by the env-manager or CI script.
app = 'chronicle-backend-{{BRANCH_SLUG}}'
primary_region = 'ams'

[build]

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"
  BACKEND_MODE = "real"
  RUST_LOG = "info,tower_http=debug"
  ENVIRONMENT = "ephemeral"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
