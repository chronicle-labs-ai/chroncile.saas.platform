[package]
name = "chronicle_backend"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[[bin]]
name = "chronicle-backend"
path = "src/main.rs"

[features]
default = ["postgres"]
kafka = ["chronicle_infra/kafka"]
postgres = ["chronicle_infra/postgres"]
helix = ["chronicle_infra/helix", "postgres"]
full = ["kafka", "postgres", "helix"]

[dependencies]
chronicle_domain = { workspace = true }
chronicle_interfaces = { workspace = true }
chronicle_infra = { workspace = true }
chronicle_mock_connector = { workspace = true }
chronicle_api = { workspace = true }
chronicle_auth = { workspace = true }
chronicle_integrations = { workspace = true }
chronicle_pipedream_connect = { workspace = true }
chronicle_nango = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = "0.8"

sqlx = { version = "0.8", features = ["postgres", "runtime-tokio"] }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
chrono = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }
sentry = { workspace = true }
sentry-tower = { workspace = true }
dotenvy = { workspace = true }
anyhow = { workspace = true }
