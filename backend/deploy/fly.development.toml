app = 'chronicle-backend-dev'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"
  BACKEND_MODE = "real"
  RUST_LOG = "debug,tower_http=debug"
  PIPEDREAM_ENVIRONMENT = "development"
  SENTRY_DSN = "https://962563178590206d935ae42ee0af131d@o4511003800109056.ingest.us.sentry.io/4511003805351936"
  SENTRY_ENVIRONMENT = "development"
  SENTRY_TRACES_SAMPLE_RATE = "1.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
