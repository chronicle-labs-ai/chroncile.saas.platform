app = 'chronicle-backend'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"
  BACKEND_MODE = "real"
  RUST_LOG = "info,tower_http=info"
  PIPEDREAM_ENVIRONMENT = "production"
  SENTRY_ENVIRONMENT = "production"
  SENTRY_TRACES_SAMPLE_RATE = "0.1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
