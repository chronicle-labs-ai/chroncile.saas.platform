name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: backend
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: backend

  lint-ts:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --immutable
      - run: yarn lint

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run tests
        run: cargo test --workspace
        working-directory: backend

  type-check:
    name: Type Generation Check
    runs-on: ubuntu-latest
    needs: [test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --immutable
      # Single source of truth: regenerate every wire shape from the
      # Rust crates (ts-rs + JSON Schema + Zod) and assert the
      # working tree is clean. Drift between Rust + frontend types
      # fails the build here.
      - name: Regenerate contracts
        run: yarn gen:contracts
      - name: Assert no drift
        run: |
          # `git diff --exit-code` catches modifications to tracked files;
          # `git status --porcelain` also flags untracked files (newly
          # emitted .ts files for a Rust struct that wasn't committed).
          # Recursive paths — all three trees are now folder-organised.
          DIFF_PATHS="packages/chronicle/src/types packages/chronicle/src/json-schema packages/chronicle/src/schemas"
          DIRTY=0
          if ! git diff --exit-code -- $DIFF_PATHS; then DIRTY=1; fi
          if [ -n "$(git status --porcelain -- $DIFF_PATHS)" ]; then DIRTY=1; fi
          if [ "$DIRTY" -ne 0 ]; then
            echo "::error::generated contracts drifted from Rust source. Run 'yarn gen:contracts' locally and commit the result."
            git status --short -- $DIFF_PATHS
            exit 1
          fi
      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: apps/frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-rust, lint-ts, test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --immutable
      - name: Build Rust backend
        run: cargo build --release
        working-directory: backend
      - name: Build frontend
        run: yarn build:frontend

  build-env-manager:
    name: Build Env Manager
    runs-on: ubuntu-latest
    needs: [lint-ts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --immutable
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/env-manager
      - name: Build env-manager
        run: yarn build:env-manager

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Install Doppler CLI
        run: curl -Ls --tlsv1.2 --proto '=https' --retry 3 https://cli.doppler.com/install.sh | sudo sh
      - name: Sync Fly secrets from Doppler (dev)
        run: ./scripts/sync-fly-secrets-from-doppler.sh dev
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_BACKEND_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io (dev)
        run: |
          flyctl deploy --config deploy/fly.development.toml --remote-only \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg GIT_TAG="" \
            --build-arg ENVIRONMENT=development
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Install Doppler CLI
        run: curl -Ls --tlsv1.2 --proto '=https' --retry 3 https://cli.doppler.com/install.sh | sudo sh
      - name: Sync Fly secrets from Doppler (stg)
        run: ./scripts/sync-fly-secrets-from-doppler.sh stg
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_BACKEND_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io (staging)
        run: |
          flyctl deploy --config deploy/fly.staging.toml --remote-only \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg GIT_TAG="" \
            --build-arg ENVIRONMENT=staging
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Install Doppler CLI
        run: curl -Ls --tlsv1.2 --proto '=https' --retry 3 https://cli.doppler.com/install.sh | sudo sh
      - name: Sync Fly secrets from Doppler (prd)
        run: ./scripts/sync-fly-secrets-from-doppler.sh prd
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_BACKEND_TOKEN }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io (production)
        run: |
          flyctl deploy --config deploy/fly.production.toml --remote-only \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg GIT_TAG="" \
            --build-arg ENVIRONMENT=production
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-branch:
    name: Deploy Ephemeral Branch Environment
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    environment: ephemeral
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Derive branch slug
        id: slug
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-30)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "app_name=chronicle-backend-$SLUG" >> "$GITHUB_OUTPUT"
      - name: Generate ephemeral fly.toml
        run: |
          sed "s/{{BRANCH_SLUG}}/${{ steps.slug.outputs.slug }}/g" \
            deploy/fly.ephemeral.toml > deploy/fly.branch.toml
        working-directory: backend
      - name: Create Fly app (if not exists)
        run: flyctl apps create ${{ steps.slug.outputs.app_name }} --org ${{ vars.FLY_ORG_SLUG }} || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io (branch)
        run: |
          flyctl deploy --config deploy/fly.branch.toml --remote-only \
            --build-arg GIT_SHA=${{ github.event.pull_request.head.sha }} \
            --build-arg GIT_TAG="" \
            --build-arg ENVIRONMENT=ephemeral
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
